<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外星仔加速器 - 免广告自动领时长 F</title>
<link rel="stylesheet" href="style.css">
<style>
#splash{position:fixed;inset:0;z-index:9999;background:#0a0a0c;display:flex;align-items:center;justify-content:center;transition:opacity 0.4s cubic-bezier(0.4,0,0.2,1)}
#splash.fade-out{opacity:0;pointer-events:none}
#splash-inner{display:flex;flex-direction:column;align-items:center;gap:16px}
#splash-logo{width:48px;height:48px;border-radius:12px;animation:splashPulse 1.5s ease-in-out infinite}
#splash-bar{width:120px;height:3px;background:#2a2a32;border-radius:2px;overflow:hidden}
#splash-bar::after{content:'';display:block;width:40%;height:100%;background:linear-gradient(90deg,#c9a84c,#e0c878);border-radius:2px;animation:splashSlide 1.2s ease-in-out infinite}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:1}}
@keyframes splashSlide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>
<div id="splash"><div id="splash-inner"><img id="splash-logo" src="logo.png" alt="外星仔加速器"><div id="splash-bar"></div></div></div>
<div id="app">
  <header class="title-bar" id="titleBar">
    <div class="title-bar-drag" id="titleBarDrag">
      <img class="logo-icon" src="logo.png" alt="F">
      <div class="title-bar-text">外星仔加速器 - 免广告自动领时长 F</div>
    </div>
    <div class="title-bar-controls">
      <button type="button" class="title-btn title-btn-min" onclick="windowMinimize()" aria-label="最小化"></button>
      <button type="button" class="title-btn title-btn-max" onclick="windowMaximize()" aria-label="最大化"></button>
      <button type="button" class="title-btn title-btn-close" onclick="windowClose()" aria-label="关闭"></button>
    </div>
  </header>

  <main class="main-content">
    <section class="stats-bar" id="statsBar">
      <!-- 第一张：启用 / 总数 合并卡片 -->
      <div class="stat-card" id="statCount">
        <div class="stat-content">
          <div class="stat-count">
            <span id="enabledCount">0</span><span class="sep">/</span><span class="total" id="totalCount">0</span>
          </div>
          <div class="stat-label">启用 / 总数</div>
        </div>
      </div>

      <!-- 第二张：批量操作卡片（三态变形 idle→select→confirm） -->
      <div class="stat-card is-action" id="batchAction">
        <div class="action-morph">
          <!-- 态0 idle：默认 -->
          <div class="action-state as-idle active">
            <svg class="idle-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
            <span class="idle-text">批量操作</span>
          </div>
          <!-- 态1 select：启用·禁用·删除 -->
          <div class="action-state as-select">
            <span class="action-text" data-action="enable">启用</span>
            <span class="action-sep">·</span>
            <span class="action-text" data-action="disable">禁用</span>
            <span class="action-sep">·</span>
            <span class="action-text is-danger" data-action="delete">删除</span>
          </div>
          <!-- 态2 confirm：确认文字 + ✓/✗ -->
          <div class="action-state as-confirm">
            <span class="confirm-text" id="confirmText">确认？</span>
            <button type="button" class="confirm-btn ok" data-act="ok"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
            <button type="button" class="confirm-btn cancel" data-act="cancel"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
          </div>
        </div>
      </div>

      <!-- 第三张：搜索卡片（折叠态占 1 格，展开态覆盖整行） -->
      <div class="search-card" id="searchCard">
        <div class="search-field">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索用户名 / 手机号 / 备注..." autocomplete="off" />
          <div class="search-underline"></div>
        </div>
      </div>

      <!-- 搜索图标按钮（绝对定位于 .stats-bar，与卡片宽度动画解耦） -->
      <button type="button" class="search-icon-btn" id="searchIconBtn" aria-label="搜索" data-tooltip="右键清除搜索结果">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
        <span class="icon-text">搜索账号</span>
      </button>
    </section>

    <section class="action-bar">
      <div class="action-bar-left-group">
      <div class="action-bar-left">
        <div class="claim-flip" id="claimFlip">
          <div class="claim-flip-inner">
            <button type="button" class="claim-flip-face claim-flip-front" id="btnClaimFront" onclick="startClaim()">开始领取</button>
            <button type="button" class="claim-flip-face claim-flip-back" id="btnClaimBack" onclick="showResultModal()">查看结果</button>
          </div>
        </div>
        <button type="button" class="btn-secondary" id="btnRefresh" onclick="refreshAll()">
          刷新状态
        </button>
        <button type="button" class="btn-accent" onclick="showAddAccount()">
          添加账号
        </button>
      </div>
      <div class="tip-module" id="tipModule" title="右击切换可见性 · 鼠标悬停暂停">
          <span class="tip-prefix">tip:</span>
          <div class="tip-viewport">
              <div class="tip-track" id="tipTrack"></div>
          </div>
          <div class="tip-tooltip" id="tipTooltip"></div>
      </div>
      </div>
      <div class="action-bar-right">
        <button type="button" class="btn-secondary" onclick="showSettings()">
          设置
        </button>
      </div>
    </section>

    <section class="accounts-section">
      <div class="section-header">
        <h2>账号列表</h2>
      </div>
      <div class="accounts-list" id="accountsList">
        <div class="empty-state">暂无账号，点击"添加账号"开始</div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onmousedown="modalMouseDownTarget=event.target" onclick="closeModal(event)">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()">
  </div>
</div>

<div class="modal-overlay" id="resultOverlay" onclick="closeResultModal(event)">
  <div class="result-modal" id="resultModalContent" onclick="event.stopPropagation()">
    <div class="result-modal-header">
      <h2>领取结果</h2>
      <button class="result-modal-close" onclick="closeResultModal()" aria-label="关闭">×</button>
    </div>
    <div class="result-summary" id="resultSummary">
      <!-- 顶部汇总统计，由 JS 动态填充 -->
    </div>
    <div class="result-list-wrapper">
      <div class="result-list" id="resultList">
        <div class="result-spacer" id="resultSpacer"></div>
        <div class="result-render" id="resultRender"></div>
      </div>
      <div class="result-empty" id="resultEmpty" hidden>
        <div class="result-empty-icon">✓</div>
        <div>暂无问题账号</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- 标题栏右键菜单（用于"重载前端"等不常用功能入口） -->
<div class="title-context-menu" id="titleContextMenu" hidden>
  <button type="button" class="title-context-item" data-act="reload-frontend">
    <span class="title-context-label">重载前端</span>
    <span class="title-context-hotkey">F5</span>
  </button>
</div>

<script src="tip-content.js"></script>
<script src="app.js"></script>
</body>
</html>
